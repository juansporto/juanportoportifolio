<section class="section" id="projetos">
  <div class="container reveal">
    <div class="section-title-wrap">
      <p class="section-kicker">Projetos</p>
      <h2>Projetos com foco em Back-End Java</h2>
    </div>

    <div class="project-grid">
      @for (project of projects; track project.title) {
        <article class="glass-card project-card">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <p class="project-stack">{{ project.stack }}</p>

          <div class="tech-icons" aria-label="Tecnologias utilizadas">
            @for (tech of project.technologies; track tech.label) {
              <span class="tech-badge" [attr.title]="tech.label" [attr.aria-label]="tech.label">
                <i [class]="tech.iconClass"></i>
                <small>{{ tech.label }}</small>
              </span>
            }
          </div>

          <div class="project-actions">
            <a class="btn btn-ghost" [href]="project.github" target="_blank" rel="noreferrer"><i class="devicon-github-original"></i> GitHub</a>
            @if (project.demo) {
              <a class="btn btn-neon" [href]="project.demo" target="_blank" rel="noreferrer"><i class="devicon-google-plain colored"></i> Demonstração</a>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
